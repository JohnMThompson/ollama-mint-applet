name: Build release package

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v[0-9]*"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install test dependencies
        run: python3 -m pip install pytest==8.3.5

      - name: Run Python tests
        run: PYTHONPATH=. python3 -m pytest -q

      - name: Check Python syntax
        run: python3 -m py_compile app.py scripts/*.py tests/*.py

      - name: Check JavaScript syntax
        run: |
          node --check web/app.js
          node --check web/scheduler.js
          node --check web/state.js
          node --check web/stream.js
          node --check cinnamon/local-mistral-chat@local/applet.js

      - name: Run JavaScript tests
        run: node --test tests/*.test.mjs

      - name: Check shell syntax
        run: bash -n scripts/*.sh install.sh

  debian-package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build package and checksum
        run: |
          rm -rf dist
          ./scripts/build-deb.sh "${GITHUB_REF_NAME#v}"
          install -m 0755 install.sh dist/install.sh
          cd dist
          sha256sum local-llm-chat_*_all.deb install.sh > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.2.0
        with:
          subject-path: dist/*

      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 ||
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          gh release upload "$GITHUB_REF_NAME" \
            dist/local-llm-chat_*_all.deb dist/install.sh dist/SHA256SUMS
