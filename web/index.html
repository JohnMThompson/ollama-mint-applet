<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local LLM Chat</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <button class="new-chat" id="newChatButton" type="button">+ New chat</button>
        </div>
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="Search chats" autocomplete="off" aria-label="Search chats">
        </div>
        <nav class="chat-list" id="chatList" aria-label="Chat history"></nav>
        <div class="sidebar-footer">
          <button class="ghost-button" id="clearHistoryButton" type="button">Clear history</button>
          <span id="storageStatus" role="status"></span>
        </div>
      </aside>

      <main class="chat-panel">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuButton" type="button" aria-label="Toggle sidebar" aria-controls="sidebar" aria-expanded="false">☰</button>
          <div class="title-block">
            <strong id="chatTitle">New chat</strong>
            <span id="connectionStatus">Checking Ollama...</span>
          </div>
          <div class="controls">
            <select id="modelSelect" aria-label="Model"></select>
            <button class="ghost-button" id="settingsButton" type="button" aria-controls="settingsPanel" aria-expanded="false">Settings</button>
          </div>
        </header>

        <section class="settings-panel" id="settingsPanel" hidden>
          <label>
            System prompt
            <textarea id="systemPrompt" rows="3" placeholder="Optional instructions for this chat"></textarea>
          </label>
          <div class="setting-grid">
            <label>
              Temperature
              <input id="temperatureInput" type="number" min="0" max="2" step="0.1" value="0.7">
            </label>
            <label>
              Context messages
              <input id="contextInput" type="number" min="2" max="40" step="1" value="16">
            </label>
          </div>
          <label class="checkbox-setting">
            <input id="generateTitlesInput" type="checkbox">
            Generate improved chat titles with the model
          </label>
        </section>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="composer">
          <textarea id="promptInput" rows="1" placeholder="Ask a question..." autocomplete="off" aria-label="Message"></textarea>
          <button class="send-button" id="sendButton" type="submit">Send</button>
          <button class="stop-button" id="stopButton" type="button" hidden>Stop</button>
        </form>
      </main>
    </div>
    <dialog class="model-dialog" id="modelDialog">
      <form method="dialog" id="modelDialogForm">
        <h2>Load an Ollama model</h2>
        <p>No model is currently running. Select a downloaded model to load before chatting.</p>
        <label>
          Downloaded model
          <select id="loadModelSelect" aria-label="Downloaded model"></select>
        </label>
        <p class="dialog-error" id="modelDialogError" role="alert" hidden></p>
        <div class="dialog-actions">
          <button class="send-button" id="loadModelButton" type="submit">Load model</button>
        </div>
      </form>
    </dialog>
    <script src="/app.js?v=3" type="module"></script>
  </body>
</html>
